<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODS Product Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #ff69b4;
            --secondary-color: #ff85c1;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        
        body {
            background: linear-gradient(135deg, #ffc0e3 0%, #ffb7d5 50%, #ff9ec7 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 192, 203, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 105, 180, 0.2) 0%, transparent 50%);
            animation: gradientShift 8s ease infinite;
            z-index: 0;
            transition: background 0.5s ease;
        }
        
        body.dark-mode::before {
            background: 
                radial-gradient(circle at 20% 50%, rgba(138, 92, 246, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(120, 119, 198, 0.15) 0%, transparent 50%);
        }
        
        @keyframes gradientShift {
            0%, 100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.1) rotate(5deg);
            }
        }
        
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .sakura {
            position: absolute;
            width: 20px;
            height: 20px;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        
        .sakura::before,
        .sakura::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 30% 30%, #ffb7d5, #ff69b4);
            border-radius: 50% 0 50% 0;
        }
        
        .sakura::before {
            top: 0;
            left: 0;
            transform: rotate(0deg);
        }
        
        .sakura::after {
            top: 0;
            left: 10px;
            transform: rotate(90deg);
        }
        
        .sakura .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle at 30% 30%, #ffcce0, #ff85b3);
            border-radius: 50% 0 50% 0;
        }
        
        .sakura .petal:nth-child(1) {
            top: 10px;
            left: 0;
            transform: rotate(180deg);
        }
        
        .sakura .petal:nth-child(2) {
            top: 10px;
            left: 10px;
            transform: rotate(270deg);
        }
        
        .sakura .petal:nth-child(3) {
            top: 5px;
            left: 5px;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff9a8, #ffd700);
            border-radius: 50%;
            transform: none;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        body.dark-mode .sakura::before,
        body.dark-mode .sakura::after {
            background: radial-gradient(circle at 30% 30%, #a78bfa, #8b5cf6);
        }
        
        body.dark-mode .sakura .petal {
            background: radial-gradient(circle at 30% 30%, #c4b5fd, #a78bfa);
        }
        
        body.dark-mode .sakura .petal:nth-child(3) {
            background: radial-gradient(circle, #fef08a, #fbbf24);
        }
        
        .dark-mode-toggle-inline {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dark-mode-toggle-inline:hover {
            transform: scale(1.1);
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            cursor: pointer;
            z-index: 10;
        }
        
        .toggle-switch input {
            display: none;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #ff69b4, #ff85c1);
            transition: 0.4s;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .slider:before {
            position: absolute;
            content: "☀️";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
        }
        
        input:checked ~ .slider {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        }
        
        input:checked ~ .slider:before {
            content: "🌙";
            transform: translateX(26px);
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 15px;
            position: relative;
            z-index: 1;
        }
        
        .app-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            border: 2px solid rgba(255, 182, 193, 0.3);
            transition: all 0.3s ease;
        }
        
        body.dark-mode .app-header {
            background: rgba(30, 30, 46, 0.95);
            box-shadow: 0 10px 30px rgba(138, 92, 246, 0.3);
            border-color: rgba(138, 92, 246, 0.3);
        }
        
        body.dark-mode .app-header h1,
        body.dark-mode .app-header p {
            color: #e0e0e0;
        }
        
        body.dark-mode .app-header i {
            color: #8b5cf6;
        }
        
        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0;
        }
        
        .app-header p {
            margin: 0;
        }
        
        .location-selector {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            border: 2px solid rgba(255, 182, 193, 0.3);
            transition: all 0.3s ease;
        }
        
        body.dark-mode .location-selector {
            background: rgba(30, 30, 46, 0.95);
            box-shadow: 0 10px 30px rgba(138, 92, 246, 0.3);
            border-color: rgba(138, 92, 246, 0.3);
        }
        
        body.dark-mode .location-selector label {
            color: #e0e0e0;
        }
        
        .location-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            background: white;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .location-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: var(--primary-color);
            transform: scale(1.05);
        }
        
        .location-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .sla-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .product-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
            transition: all 0.3s;
            border: 1px solid rgba(255, 182, 193, 0.3);
        }
        
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
            border-color: rgba(255, 105, 180, 0.5);
        }
        
        body.dark-mode .product-card {
            background: rgba(40, 40, 60, 0.9);
            box-shadow: 0 4px 15px rgba(138, 92, 246, 0.2);
            border-color: rgba(138, 92, 246, 0.3);
        }
        
        body.dark-mode .product-card:hover {
            box-shadow: 0 8px 25px rgba(138, 92, 246, 0.3);
            border-color: rgba(138, 92, 246, 0.5);
        }
        
        body.dark-mode .product-label {
            color: #e0e0e0;
        }
        
        .product-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        
        .product-label {
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            flex: 1;
            margin-left: 12px;
            font-size: 0.8rem;
        }
        
        .product-sla {
            background: linear-gradient(135deg, #ff69b4, #ff85c1);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .channel-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .channel-1 { background: #dbeafe; color: #1e40af; }
        .channel-2 { background: #fce7f3; color: #be185d; }
        .channel-3 { background: #d1fae5; color: #065f46; }
        .channel-4 { background: #fef3c7; color: #92400e; }
        
        .summary-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            border: 2px solid rgba(255, 182, 193, 0.3);
            transition: all 0.3s ease;
        }
        
        body.dark-mode .summary-card {
            background: rgba(30, 30, 46, 0.95);
            box-shadow: 0 10px 30px rgba(138, 92, 246, 0.3);
            border-color: rgba(138, 92, 246, 0.3);
        }
        
        body.dark-mode .summary-title {
            color: #e0e0e0;
        }
        
        .summary-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .selected-item {
            background: #f3f4f6;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (min-width: 768px) {
            .app-container {
                max-width: 768px;
            }
            
            .product-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .product-card {
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body class="dark-mode">
    <!-- Floating Sakura Background -->
    <div class="floating-shapes" id="sakuraContainer"></div>
    
    <div class="app-container">
        <!-- Header -->
        <div class="app-header text-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div style="width: 60px;"></div>
                <div class="flex-grow-1">
                    <i class="bi bi-shop fs-1 text-primary"></i>
                </div>
                <div class="dark-mode-toggle-inline">
                    <div class="toggle-switch" onclick="toggleDarkMode()">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </div>
                </div>
            </div>
            <h1>MODS Product Selection</h1>
            <p class="text-muted mb-0">Select products and view SLA</p>
        </div>
        
        <!-- Summary -->
        <div class="summary-card" id="summaryCard" style="margin-bottom: 30px;">
            <div class="summary-title">
                <i class="bi bi-clipboard-check"></i> Selected Summary
            </div>
            <div id="selectedProducts">
                <div class="alert alert-info mb-0" style="border-radius: 12px; border: none; background: linear-gradient(135deg, #e5e7eb, #d1d5db); color: #6b7280;">
                    <div class="text-center py-2">
                        <i class="bi bi-info-circle"></i> Please select products
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Products List -->
        <div class="location-selector">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <label class="form-label fw-bold text-secondary mb-0">
                    <i class="bi bi-card-checklist"></i> Select Products
                </label>
                <select class="form-select" id="selectionMode" style="width: auto; font-size: 0.85rem;">
                    <option value="none">Clear All</option>
                    <option value="minimum" selected>Minimum SLA</option>
                    <option value="all">Select All</option>
                </select>
            </div>
            <div class="product-grid" id="productList">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
