<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODS Product Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 15px;
        }
        
        .app-header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0;
        }
        
        .app-header p {
            margin: 0;
        }
        
        .location-selector {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .location-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            background: white;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .location-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: var(--primary-color);
            transform: scale(1.05);
        }
        
        .location-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .sla-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .product-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        
        .product-label {
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            flex: 1;
            margin-left: 12px;
            font-size: 0.8rem;
        }
        
        .product-sla {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .channel-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .channel-1 { background: #dbeafe; color: #1e40af; }
        .channel-2 { background: #fce7f3; color: #be185d; }
        .channel-3 { background: #d1fae5; color: #065f46; }
        .channel-4 { background: #fef3c7; color: #92400e; }
        
        .summary-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .summary-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .selected-item {
            background: #f3f4f6;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        @media (min-width: 768px) {
            .app-container {
                max-width: 768px;
            }
            
            .product-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .product-card {
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="app-header text-center">
            <i class="bi bi-shop fs-1 text-primary mb-2"></i>
            <h1>MODS Product Selection</h1>
            <p class="text-muted mb-0">Select products and view SLA</p>
        </div>
        
        <!-- Summary -->
        <div class="summary-card" id="summaryCard" style="margin-bottom: 30px;">
            <div class="summary-title">
                <i class="bi bi-clipboard-check"></i> Selected Summary
            </div>
            <div id="selectedProducts">
                <div class="alert alert-info mb-0" style="border-radius: 12px; border: none; background: linear-gradient(135deg, #e5e7eb, #d1d5db); color: #6b7280;">
                    <div class="text-center py-2">
                        <i class="bi bi-info-circle"></i> Please select products
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Products List -->
        <div class="location-selector">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <label class="form-label fw-bold text-secondary mb-0">
                    <i class="bi bi-card-checklist"></i> Select Products
                </label>
                <select class="form-select" id="selectionMode" style="width: auto; font-size: 0.85rem;">
                    <option value="none">Clear All</option>
                    <option value="minimum" selected>Minimum SLA</option>
                    <option value="all">Select All</option>
                </select>
            </div>
            <div class="product-grid" id="productList">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
